帝君有命令弟子某等度太隂水災之厄弟子再禮次行至東北人門師曰洞神三皇内景弟子某等朝太陽日君弟子再禮師曰帝君有命令弟子某等度山林刑獄虎狼毒蟲日門之厄弟子再禮次左行至天門師曰洞神三皇内君弟子某等朝天門君弟子再禮師曰帝君有命令弟子某等度天門刀兵鋒力刑殺之厄弟子再禮无太玄内景眞元之靈祐護臣身使朝夕呪誦響徹髙尊厄難超度克獲神仙拜見太一紫府之君終入无形與道合眞次讃引至玄師前散如常儀若醮籙便可於十二願前醮或來早醮了次拜表言功太上洞神三皇傳授儀
