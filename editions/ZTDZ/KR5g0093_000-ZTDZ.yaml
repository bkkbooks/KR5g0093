body:
  text: 次開眞官籙无上玄老太清天皇正眞上官直使功曹太官直使功曹左官直使功曹右官直使功曹中官直使功曹都官直使功曹正一直使功曹左明功曹右明功曹右九部各九千萬人度无上玄老大清天皇眞仙上官上部功曹左官上部功曹右官上部功曹中官上部功曹右四部各九千萬人度天皇太上上眞上部功曹都部功曹左都部功曹右都部功曹正一中官都部功曹都官前部功曹都官後部功曹太官上部功曹上官下部功曹右九部各九千萬人度天皇太上眞促炁功曹促炁左功曹促炁右功曽定炁功曹左定炁功曹右定炁功曹隂陽功曹左隂陽功曹右隂陽功曹右九部各九千萬人度天皇眞仙太官左生炁功曹太官右生炁功曹中官中生炁功曹太官中生炁功曹左都官生炁功曹右都官生炁功曹治病功曹左右治病功曹右八部各九千萬人度天皇眞仙左大官五炁功曹太官都監功曹太官左都監功曹太官右都監功曹右太官五炁功曹中太官五炁功曹右六部各九千萬人度天皇神仙上眞太官監察功曹左太官監察功曹右太官監察功曹太官三五功曹左太官三五功曹右太官三五功曹中官三五功曹都官三五功曹九宮功曹左九宮功曹右九宮功曹五星玉仙功曹五星玉仙左功曹五星玉仙右功曹右十四部各九千萬人度天皇至眞上仙上部使者左上部使者右上部使者太官使者中官使者太官中使者上官左部官使者上官右部官使者右八部各九千萬人度天皇至眞上仙太官都使者左都部使者右都部使者太官下部使者上官下部使者下官上部使者下官都部使者上官下部左官使者上官下部右官使者上官神官神仙大和右十部各九千萬人度天皇至眞神仙太和左官使者太和右官使者遐賢使者遐賢左使者遐賢右使者洞逹逺察使者洞建逺察左使者洞逹逺察右使者无極洞明上官使者都部功曹使者右十部各九千萬人度天皇眞形眞符神將吏兵一部度天皇畢地皇眞仙太上神明无極洞明使者左官使者右官使者上官使者上官監神使者太官監神使者左官監神使者右官監神使者都官使者右九部各一十二萬人度地皇眞仙太上神明太官監天使者左官監天使者右官監天使者都官監天使者无上正一監地使者左監地使者右監地使者中官監地使者太官監地使者右九部各一十二萬人度地皇眞仙太上神明上官監水使者左官監水使者右官監水使者中官監水使者正一官監水使者右五部各一十二萬人度地皇眞仙太上神明太官監兵使者眞正官監兵使者眞正左官監兵使者眞正右官監兵使者眞官監兵使者正一都官監兵使者六部各一十二萬人度地皇眞仙太上神明太官監屬使者左官監屬使者右官監屬使者正一都官監屬使者太上監生東嶽使者南嶽使者西嶽使者北嶽使者中嶽使者右十部各一十二萬人度地皇眞仙太上神明東海使者南海使者中海使者西海使者北海使者水官使者右六部各一十二萬人度地皇眞仙太上神明主正眞三河使者九江使者主七十二名山使者湯谷神王主八極使者正眞神主山林孟長十二淮濟使者主十二河平侯使者右七部各一十二萬人度地皇眞仙太上神明大將軍左玄大將軍右玄大將軍中玄大將軍上一大將軍中一大將軍下一大將軍前一大將軍後一大將軍上元大將軍中元大將軍下元大將軍右十二部各一十二萬人度地皇眞仙太上神明太元玄元大將軍左太元玄元大將軍右太元玄元大將軍太元上部大將軍太元下部大將軍太初大將軍太初左領大將軍太初右領大將軍太初前部大將軍太始大將軍太始左大將軍太始右大將軍太始前大將軍太始後大將軍太始中玄大將軍太始上玄大將軍太始下玄大將軍右一十七部各一十二萬人度地皇眞仙太上神明太素上元大將軍中元大將軍下元大將軍左玄大將軍右玄大將軍前部大將軍後部大將軍右七部各一十二萬人度地皇眞仙太上神明太儀大將軍太上大將軍左領大將軍右領大將軍前部大將軍後部大將軍上素大將軍中素大將軍下素大將軍右九部各一十二萬人度地皇眞仙太上神明太玄大將軍左上大將軍右上大將軍前部大將軍後部大將軍中玄大將軍下玄大將軍眞玄大將軍右八部各一十二萬人度地皇眞仙太上神明太素太寳大將軍大玄太寳大將軍太寳左將軍太寳右將軍太寳中將軍太寳前部大將軍太寳後部大將軍上元大寳大將軍中元大寳大將軍下元大寳大將軍右十部各一十二萬人度地皇眞仙太上神明神荼鬱壘五道九皇君五仙九靈皇極君皇極九靈君皇極君皇靈君右六部各一十二萬人度地皇眞形眞符神將吏兵隨文度地皇畢人皇眞靈太上神明舉仙元皇九天君太皇君皇光永度九天君中皇九昊君中靈大德君道化皇君九眞皇機君太平元皇君右八部各七萬人度人皇眞靈太上神明導神通明君顯皇通炁君皇神通元君皇天太上陽明𠃔公君九炁通眞君九曜元靈君太極返眞君少陽君上靈太仙君皇極玉童君皇極青腰玉女東皇青陽明靈仙童元皇青帝勾芒君皇仙大洞元靈君右一十四部各七萬人度人皇眞靈太上神明赤靈太陽太丹君執法延夀司録君曜靈南極丈人玉童皇靈赤帝玉女赤帝絳章仙童南極太皇寳魄曜魂君赤帝祝融太陽君右七部各七萬人度人皇眞靈太上神明太白子留元道君元素元皇君浩皇元素玉童化皇元靈玉女九皇大洞玉機玉女西皇白帝素仙靈童元皇元影寳魂定魄君太皇白帝蓐收少隂君右八部各七萬人度人皇眞靈太上神明東極靈寳元君眞靈五靈元華君太皇五靈玉仙君太隂玄門太極五仙君大辰九皇伐殺君鬱𡨋皇機君太元上皇道母玉女仙皇隂皇