body:
  text: 次開真官籙無上玄老太清天皇正真上官直使功曹太官直使功曹左官直使功曹右官直使功曹中官直使功曹都官直使功曹正一直使功曹左明功曹右明功曹右九部各九千萬人度無上玄老大清天皇真仙上官上部功曹左官上部功曹右官上部功曹中官上部功曹右四部各九千萬人度天皇太上上真上部功曹都部功曹左都部功曹右都部功曹正一中官都部功曹都官前部功曹都官後部功曹太官上部功曹上官下部功曹右九部各九千萬人度天皇太上真促氣功曹促氣左功曹促氣右功曽定氣功曹左定氣功曹右定氣功曹隂陽功曹左隂陽功曹右隂陽功曹右九部各九千萬人度天皇真仙太官左生氣功曹太官右生氣功曹中官中生氣功曹太官中生氣功曹左都官生氣功曹右都官生氣功曹治病功曹左右治病功曹右八部各九千萬人度天皇真仙左大官五氣功曹太官都監功曹太官左都監功曹太官右都監功曹右太官五氣功曹中太官五氣功曹右六部各九千萬人度天皇神仙上真太官監察功曹左太官監察功曹右太官監察功曹太官三五功曹左太官三五功曹右太官三五功曹中官三五功曹都官三五功曹九宮功曹左九宮功曹右九宮功曹五星玉仙功曹五星玉仙左功曹五星玉仙右功曹右十四部各九千萬人度天皇至真上仙上部使者左上部使者右上部使者太官使者中官使者太官中使者上官左部官使者上官右部官使者右八部各九千萬人度天皇至真上仙太官都使者左都部使者右都部使者太官下部使者上官下部使者下官上部使者下官都部使者上官下部左官使者上官下部右官使者上官神官神仙大和右十部各九千萬人度天皇至真神仙太和左官使者太和右官使者遐賢使者遐賢左使者遐賢右使者洞逹逺察使者洞建逺察左使者洞逹逺察右使者無極洞明上官使者都部功曹使者右十部各九千萬人度天皇真形真符神將吏兵一部度天皇畢地皇真仙太上神明無極洞明使者左官使者右官使者上官使者上官監神使者太官監神使者左官監神使者右官監神使者都官使者右九部各一十二萬人度地皇真仙太上神明太官監天使者左官監天使者右官監天使者都官監天使者無上正一監地使者左監地使者右監地使者中官監地使者太官監地使者右九部各一十二萬人度地皇真仙太上神明上官監水使者左官監水使者右官監水使者中官監水使者正一官監水使者右五部各一十二萬人度地皇真仙太上神明太官監兵使者真正官監兵使者真正左官監兵使者真正右官監兵使者真官監兵使者正一都官監兵使者六部各一十二萬人度地皇真仙太上神明太官監屬使者左官監屬使者右官監屬使者正一都官監屬使者太上監生東嶽使者南嶽使者西嶽使者北嶽使者中嶽使者右十部各一十二萬人度地皇真仙太上神明東海使者南海使者中海使者西海使者北海使者水官使者右六部各一十二萬人度地皇真仙太上神明主正真三河使者九江使者主七十二名山使者湯谷神王主八極使者正真神主山林孟長十二淮濟使者主十二河平侯使者右七部各一十二萬人度地皇真仙太上神明大將軍左玄大將軍右玄大將軍中玄大將軍上一大將軍中一大將軍下一大將軍前一大將軍後一大將軍上元大將軍中元大將軍下元大將軍右十二部各一十二萬人度地皇真仙太上神明太元玄元大將軍左太元玄元大將軍右太元玄元大將軍太元上部大將軍太元下部大將軍太初大將軍太初左領大將軍太初右領大將軍太初前部大將軍太始大將軍太始左大將軍太始右大將軍太始前大將軍太始後大將軍太始中玄大將軍太始上玄大將軍太始下玄大將軍右一十七部各一十二萬人度地皇真仙太上神明太素上元大將軍中元大將軍下元大將軍左玄大將軍右玄大將軍前部大將軍後部大將軍右七部各一十二萬人度地皇真仙太上神明太儀大將軍太上大將軍左領大將軍右領大將軍前部大將軍後部大將軍上素大將軍中素大將軍下素大將軍右九部各一十二萬人度地皇真仙太上神明太玄大將軍左上大將軍右上大將軍前部大將軍後部大將軍中玄大將軍下玄大將軍真玄大將軍右八部各一十二萬人度地皇真仙太上神明太素太寶大將軍大玄太寶大將軍太寶左將軍太寶右將軍太寶中將軍太寶前部大將軍太寶後部大將軍上元大寶大將軍中元大寶大將軍下元大寶大將軍右十部各一十二萬人度地皇真仙太上神明神荼鬱壘五道九皇君五仙九靈皇極君皇極九靈君皇極君皇靈君右六部各一十二萬人度地皇真形真符神將吏兵隨文度地皇畢人皇真靈太上神明舉仙元皇九天君太皇君皇光永度九天君中皇九昊君中靈大德君道化皇君九真皇機君太平元皇君右八部各七萬人度人皇真靈太上神明導神通明君顯皇通氣君皇神通元君皇天太上陽明允公君九氣通真君九曜元靈君太極返真君少陽君上靈太仙君皇極玉童君皇極青腰玉女東皇青陽明靈仙童元皇青帝勾芒君皇仙大洞元靈君右一十四部各七萬人度人皇真靈太上神明赤靈太陽太丹君執法延夀司録君曜靈南極丈人玉童皇靈赤帝玉女赤帝絳章仙童南極太皇寶魄曜魂君赤帝祝融太陽君右七部各七萬人度人皇真靈太上神明太白子留元道君元素元皇君浩皇元素玉童化皇元靈玉女九皇大洞玉機玉女西皇白帝素仙靈童元皇元影寶魂定魄君太皇白帝蓐收少隂君右八部各七萬人度人皇真靈太上神明東極靈寶元君真靈五靈元華君太皇五靈玉仙君太隂玄門太極五仙君大辰九皇伐殺君鬱𡨋皇機君太元上皇道母玉女仙皇隂皇仙靈北太皇寶魄定魂君黑帝玄冥君右十部各七萬人度人皇真靈太上神明中皇三天都録司命君中皇洞極玄天君太山上皇君領仙元皇玉童元陽千二百官玉仙君皇靈太山君元皇保魂曜魄君中皇后土三泰千二百官君右八部各十萬人度人皇真靈太上神明皇靈度世升玄功曹皇靈隂陽治病功曹洞元功曹洞天元氣治病功曹洞天治病功曹隂陽護命功曹紫元度命更生功曹洞天無極度命功曹洞天太元度命功曹洞天紫元虎符將軍洞天無極虎符將軍洞天太元虎符將軍洞天虎賁郎吏符吏洞天虎賁郎吏右一十四部各七萬人度人皇真形真氣官將吏兵一部隨文度次授金剛玄籙太上洞神上元洞天金剛玄籙度太一神仙金剛大將軍左將軍右將軍金玄大將軍左將軍右將軍金威大將軍左將軍右將軍金光大將軍左將軍右將軍右一十二部各十億萬人度大一神仙金剛羽車金光羽車鳯皇羽車右一十二部各六十六乘度大一神仙金剛羽蓋金根羽蓋獨轅羽蓋金剛流精等騎金剛符吏右五部各九十六萬人度太一神仙破敵金剛將齎章飛龍騎太太上上太一君天兵騎吏開通仙路騎右四部各九十六萬人度太一太清神仙上皇真人髙車剌史三陽功曹五陽功曹皇真天君吏左右執法君左右執法吏皇天執法君皇天執法吏右九部各九十六人度太一神仙金剛上三天執法開化君左右隂陽功曹右各九十六人度太一神仙金剛玉珮使者羽佩使者右各九十六人度太一神仙金剛明導吏通玄吏通真吏通道吏通精吏通神吏通氣吏右七部各九十六人度太一神仙金剛無極長生吏直符吏直事吏金剛功曹主簿幹佐傳言書佐習事小吏零下五百吏雲中輔章吏督卸從事右十部各六十六人度太一神仙金剛元洞玄籙一十四萬萬四千部將軍車騎將吏功曹主簿內外諸官度金剛大符度星斗真氣吏兵真形隨文度次授法位太上洞神三皇內景弟子臣某等洞神法居三洞之初法師逺遊冠黃裙帔三十二條左帶太一三元之劒長三尺右垂白玉之珮持青黃白三色之節次師稱法位大謝上清玄都三洞弟子太太上上太上君太元一君天師門下督察大都監君黃赤真一三一丈人無上太一金剛金闕帝君三洞法師玉清左監靈大夫某嶽先生小兆臣真人某稽首再拜上白太太上上皇天上帝無極太上元君太元一君大都督鬼監君妙行真人天帝大王九天元洞無極大帝君大帝丈人玉洞九玄洞真洞玄靈寶三皇洞神洞泉真君太極髙靈太帝真人監齋威靈大神大洞尊神元始君上清金闕後聖帝君三十六部寶經符圖太真君太真丈人太上王晨虛皇大道君十方無極應感至真臣九土之中塵微細品生逢道化正法流行搜選種民宣弘要順而得預參受之例窺盻寶文授度靈官君將兵吏外以佐國救厄濟人內以立功保神護命恩深施重非蟲蟻所勝尚慮積世以來玄祖流逮愆咎增積未獲原除巳身瑕舋充塞未解豈宜越冒天憲而傳付宣行但盟告之初玄科有約五八數滿法當流行今有某等清潔身心歸依大道列詞奉信誓告神明請受三皇寶文洞神大法觀詞審意難可抑違即與對齋露文請乙應驗人神交契似合天科以某日登壇傳授事畢某實自好道希慕長生非人拘逼抑令伏受其有臣及某從來所犯一切罪惡恩大宥之施並乞蕩除克巳自新於今更始臣謹遣元始功曹飛雲使者齎盟文宣告付某身謹以啓聞伏惟太上高靈萬聖至尊皇天太上帝太帝玉陛下愍其所求許臣所奉聽某佩受特乞勑下五方五帝君各領玉童玉女三千人侍衛經寶祐護某身又勑九夷八蠻六戎五狄三秦君等各率所部清淨法壇某齋直禮拜常如聖君三皇對景鑑盻使某修習成就功行圓明天官靈仙遷功舉善七世父母升入天堂積世愆非於今蕩滌役御神鬼制伏凶妖為天人師利民佐國功充之日列品仙階若某負約愆盟輕師慢法修行不謹虧損天真當謝三官長充考責謹愼恭守則三寶垂祐科戒有徴限畢之辰授與賢信紹續大化輔贊教儀天地萬靈鑒其信誓臣等不任懇悃懴謝之至謹啓起各禮三拜次取鞶帶衣外繫之日在前月在後結於心下次劵文囊盛結肘次皇文大字著鞶帶中次黃女符繫腰次九皇圖繫心前次天水符髻中次九天符肘後次升天符繫腰次傳版在背後次靈書繫肘次丹書繫腰次八威五勝符心前次三一真形執之次童子籙繫肘次符契在肘次三皇越章印在腰次符使符背後領下次普下版笏上重執之男左女右次左行至申壇地戶師曰洞神三皇內景弟子某等謁地戶亭長守室靈人一拜師曰帝君有命令弟子某等度地戶五瘟五魔一切災疾疫癘之厄弟子再禮次出地戶至下級壇前正位立師曰洞神三皇內景弟子某等朝太一君再禮太帝君再禮天帝君再禮帝君有命令弟子某等朝拜太一免脫災凶長離地苦永保天福弟子再禮次先令弟子出壇次師十二願次復爐香煙玉女侍直衆官當令傳道之所有英芝玉精自生天帝御前臣與弟子身生紫絡藏發絳煙羣生享福家國蒙恩十方侍頁王女傳奏所啓徑達三皇真君几前次吟遊神頌烈烈廣寒庭寥寥宴仙室玄𡨋唱陽歌大景披雲出錬沐含陽精長梵𧧷太一自非篤志賢安能好遊逸次學仙下壇亦出戶呪太虛三玄虛天三元素靈玉女七微皓鬱虛謁皇君某國年太歲月朔日時州縣鄉里某年歲月日生今署洞神弟子即日於某處皇壇之上再禮第一簡謁天皇君讀此至再禮長跪置簡案上古法用朱玉為簡赤金為字今用朱書第二簡謁地皇君第三簡謁人皇君簡文悉同各長二尺二寸闊二寸四分厚二分牙玉金銀銀木並可為之作五行行書令周備如法禮謁畢次師引弟子度四門解厄下就中壇西南月門之下師曰洞神三皇內景弟子某等朝太隂月君再禮師曰帝君有命令弟子某等度太隂水災之厄弟子再禮次行至東北人門師曰洞神三皇內景弟子某等朝太陽日君弟子再禮師曰帝君有命令弟子某等度山林刑獄虎狼毒蟲日門之厄弟子再禮次左行至天門師曰洞神三皇內君弟子某等朝天門君弟子再禮師曰帝君有命令弟子某等度天門刀兵鋒力刑殺之厄弟子再禮無太玄內景真元之靈祐護臣身使朝夕呪誦響徹髙尊厄難超度克獲神仙拜見太一紫府之君終入無形與道合真次讃引至玄師前散如常儀若醮籙便可於十二願前醮或來早醮了次拜表言功太上洞神三皇傳授儀
